spring:
  application:
    name: payment-ms

  datasource:
    url: jdbc:mysql://localhost:3306/payment_db
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true


springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

server:
  port: 8086
  servlet:
    context-path: /payment-service-ms