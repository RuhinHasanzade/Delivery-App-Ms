spring:
  application:
    name: chatservice-ms

  datasource:
    url: jdbc:mysql://localhost:3306/chatservice?createDatabaseIfNotExist=true&characterEncoding=UTF-8&serverTimezone=UTC
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
      dialect: org.hibernate.dialect.MySQL8Dialect
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  liquibase:
    enabled: false
    change-log: classpath:db/changelog/db-changelog.yaml

server:
  port: 8089
  servlet:
    context-path: /chatservice-ms

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  security:
    jwt-secret: mysecretkeymysecretkeymysecretkey12345
    internal-token: ${INTERNAL_TOKEN:change-me}

chat:
  order-service:
    base-url: ${ORDER_SERVICE_BASE_URL:http://localhost:8085}